name: HumanTypist
options:
  bundleIdPrefix: com.humantypist
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    PRODUCT_BUNDLE_IDENTIFIER: com.humantypist.app
    INFOPLIST_FILE: App/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  HumanTypist:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: UI
      - path: Core
        excludes:
          - "*Tests.swift"
      - path: Resources
    settings:
      base:
        PRODUCT_NAME: HumanTypist
        GENERATE_INFOPLIST_FILE: NO

  HumanTypistTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Core/PreferencesTests.swift
        buildPhase: sources
      - path: Core/Preferences.swift
        buildPhase: sources
      - path: Core/TypingEngineTests.swift
        buildPhase: sources
      - path: Core/TypingEngine.swift
        buildPhase: sources
      - path: Core/HotkingTests.swift
        buildPhase: sources
      - path: Core/HotkeyManager.swift
        buildPhase: sources
      - path: Core/ClipboardMonitorTests.swift
        buildPhase: sources
      - path: Core/ClipboardMonitor.swift
        buildPhase: sources
    dependencies:
      - sdk: XCTest.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.humantypist.app.tests
        GENERATE_INFOPLIST_FILE: YES
